app = "scos-oms-prod"
primary_region = "iad"

[build]
  dockerfile = "apps/api/Dockerfile"

[deploy]
  release_command = "sh -c 'node apps/api/dist/db/migrate.js && node apps/api/dist/db/seed.js'"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  LOG_LEVEL = "info"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "10s"
    timeout = "2s"
    grace_period = "10s"
    method = "GET"
    path = "/api/v1/ready"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
