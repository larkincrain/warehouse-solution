services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: scos
      POSTGRES_USER: scos
      POSTGRES_PASSWORD: scos
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scos -d scos"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
