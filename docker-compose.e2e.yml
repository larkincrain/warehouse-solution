services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: scos
      POSTGRES_USER: scos
      POSTGRES_PASSWORD: scos
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scos -d scos"]
      interval: 2s
      timeout: 5s
      retries: 30

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://scos:scos@db:5432/scos
      NODE_ENV: production
      PORT: 3000
    depends_on:
      db: { condition: service_healthy }
    ports: ["3000:3000"]
    command: >
      sh -c "node apps/api/dist/db/migrate.js &&
             node apps/api/dist/db/seed.js &&
             node apps/api/dist/server.js"
