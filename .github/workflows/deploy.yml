name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    # Preview app + db are reused across pushes within a PR (fast iteration).
    # Closing the PR triggers the cleanup job; reopening provisions fresh.
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions: { pull-requests: write }
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      APP_NAME: scos-oms-pr-${{ github.event.number }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@fc53c09e1bc3be6f54706524e3b82c4f462f77be # 1.5
      - name: Create preview app if missing
        run: |
          if ! flyctl status --app "$APP_NAME" >/dev/null 2>&1; then
            flyctl apps create "$APP_NAME" --org personal
            flyctl postgres create --name "${APP_NAME}-db" --region iad --vm-size shared-cpu-1x --volume-size 1 --org personal --initial-cluster-size 1
            flyctl postgres attach --app "$APP_NAME" "${APP_NAME}-db"
          fi
      - run: flyctl deploy --app "$APP_NAME" --remote-only --config fly.toml
      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Preview deployed: https://${process.env.APP_NAME}.fly.dev/api/v1/ready`,
            });

  production:
    # Triggered by main pushes; also runnable manually via workflow_dispatch.
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@fc53c09e1bc3be6f54706524e3b82c4f462f77be # 1.5
      - run: flyctl deploy --app scos-oms-prod --remote-only
      - name: Smoke test
        run: |
          for i in $(seq 1 30); do
            if curl -sf https://scos-oms-prod.fly.dev/api/v1/ready > /dev/null; then exit 0; fi
            sleep 5
          done
          echo "smoke test failed; rolling back"
          flyctl releases rollback --app scos-oms-prod
          exit 1

  cleanup:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      APP_NAME: scos-oms-pr-${{ github.event.number }}
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@fc53c09e1bc3be6f54706524e3b82c4f462f77be # 1.5
      - name: Destroy preview app and its postgres
        run: |
          flyctl apps destroy "$APP_NAME" -y || true
          flyctl apps destroy "${APP_NAME}-db" -y || true
